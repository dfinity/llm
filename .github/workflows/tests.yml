name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  motoko-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dfx
        uses: dfinity/setup-dfx@e50c04f104ee4285ec010f10609483cf41e4d365 # main

      - name: Install mops
        run: |
          dfx cache install
          echo "$(dfx cache show)" >> $GITHUB_PATH
          curl -fsSL cli.mops.one/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Motoko tests
        working-directory: ./motoko
        run: mops test

  rust-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          toolchain: 1.84.1

      - name: Cache cargo dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: ./rust
        run: cargo test --verbose

  rust-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: rust-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          toolchain: 1.84.1
          components: clippy, rustfmt

      - name: Restore cargo cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust clippy
        working-directory: ./rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check Rust formatting
        working-directory: ./rust
        run: cargo fmt -- --check

  typescript-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dfx
        uses: dfinity/setup-dfx@e50c04f104ee4285ec010f10609483cf41e4d365 # main

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 8.x

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18.x'
          cache: 'pnpm'
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install TypeScript dependencies
        working-directory: ./typescript
        run: pnpm install

      - name: Build TypeScript
        working-directory: ./typescript
        run: pnpm run build

      - name: TypeScript type check
        working-directory: ./typescript
        run: pnpm exec tsc --noEmit

  # Summary job that depends on all test jobs
  tests-summary:
    needs: [motoko-tests, rust-lint, typescript-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "📊 Test Results Summary:"
          echo "Motoko tests: ${{ needs.motoko-tests.result }}"
          echo "Rust lint (includes tests): ${{ needs.rust-lint.result }}"
          echo "TypeScript build: ${{ needs.typescript-build.result }}"
          echo ""
          
          if [[ "${{ needs.motoko-tests.result }}" == "success" && 
                "${{ needs.rust-lint.result }}" == "success" && 
                "${{ needs.typescript-build.result }}" == "success" ]]; then
            echo "✅ All tests and checks passed!"
            exit 0
          else
            echo "❌ Some tests or checks failed!"
            exit 1
          fi 